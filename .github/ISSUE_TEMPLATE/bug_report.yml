name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Library version
      description: Which version of idempotency4j are you using?
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: e.g. Java 21
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet that reproduces the issue.
      placeholder: |
        1. Configure IdempotencyStore with ...
        2. Send POST /endpoint with header Idempotency-Key: abc
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack traces
      render: text
